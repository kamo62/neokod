name: Release Neokod

on:
  push:
    tags:
      - "v*.*.*"
      - "!v*-nightly.*"
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel
        required: false
        default: stable
        type: choice
        options:
          - stable
          - nightly
      version:
        description: Release version, for example 1.2.3 or v1.2.3
        required: false
        type: string

permissions:
  contents: read

jobs:
  check_changes:
    name: Check for changes since last nightly
    if: github.event_name == 'schedule'
    runs-on: ubuntu-24.04
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: check
        shell: bash
        run: |
          last_nightly_tag=$(git tag --list 'v*-nightly.*' 'nightly-v*' --sort=-creatordate | head -n 1)
          if [[ -z "$last_nightly_tag" || "$(git rev-parse "$last_nightly_tag^{commit}")" != "$(git rev-parse HEAD)" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

  preflight:
    name: Preflight
    needs: [check_changes]
    if: |
      !failure() && !cancelled() &&
      (github.event_name != 'schedule' || needs.check_changes.outputs.has_changes == 'true')
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    outputs:
      release_channel: ${{ steps.release_meta.outputs.release_channel }}
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
      release_name: ${{ steps.release_meta.outputs.name }}
      previous_tag: ${{ steps.previous_tag.outputs.previous_tag }}
      is_prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
      make_latest: ${{ steps.release_meta.outputs.make_latest }}
      ref: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Ensure Electron runtime is installed
        run: vp run --filter @neokod/desktop ensure:electron

      - id: release_meta
        name: Resolve release version
        shell: bash
        env:
          DISPATCH_CHANNEL: ${{ github.event.inputs.channel }}
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
          NIGHTLY_DATE: ${{ github.run_started_at }}
          NIGHTLY_SHA: ${{ github.sha }}
          NIGHTLY_RUN_NUMBER: ${{ github.run_number }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "schedule" || ( "$GITHUB_EVENT_NAME" == "workflow_dispatch" && "${DISPATCH_CHANNEL:-stable}" == "nightly" ) ]]; then
            nightly_date="$(date -u -d "$NIGHTLY_DATE" +%Y%m%d)"
            node scripts/resolve-nightly-release.ts \
              --date "$nightly_date" \
              --run-number "$NIGHTLY_RUN_NUMBER" \
              --sha "$NIGHTLY_SHA" \
              --github-output
            echo "release_channel=nightly" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          else
            if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
              raw="$DISPATCH_VERSION"
              [[ -n "$raw" ]] || { echo "Stable dispatch requires a version." >&2; exit 1; }
            else
              raw="$GITHUB_REF_NAME"
            fi
            version="${raw#v}"
            [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]] || { echo "Invalid release version: $raw" >&2; exit 1; }
            echo "release_channel=stable" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "tag=v$version" >> "$GITHUB_OUTPUT"
            echo "name=Neokod v$version" >> "$GITHUB_OUTPUT"
            if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
              echo "make_latest=true" >> "$GITHUB_OUTPUT"
            else
              echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
              echo "make_latest=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - run: vp check
      - run: vp run typecheck
      - run: vp run test

      - id: previous_tag
        run: |
          node scripts/resolve-previous-release-tag.ts \
            --channel "${{ steps.release_meta.outputs.release_channel }}" \
            --current-tag "${{ steps.release_meta.outputs.tag }}" \
            --github-output

  build_wsl_node_pty:
    name: Build WSL node-pty
    needs: [preflight]
    if: ${{ !failure() && !cancelled() && needs.preflight.result == 'success' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Build Linux node-pty prebuild
        shell: bash
        run: |
          pty_pkg="$(node -e "console.log(require.resolve('node-pty/package.json', { paths: ['$GITHUB_WORKSPACE/apps/server'] }))")"
          pty_dir="$(dirname "$pty_pkg")"
          ( cd "$pty_dir" && npx --yes node-gyp rebuild )
          mkdir -p wsl-prebuild
          cp "$pty_dir/build/Release/pty.node" wsl-prebuild/pty.node

      - uses: actions/upload-artifact@v7
        with:
          name: wsl-node-pty-x64
          path: wsl-prebuild/pty.node
          if-no-files-found: error
          retention-days: 1

  create_release:
    name: Create draft release
    needs: [preflight]
    if: ${{ !failure() && !cancelled() && needs.preflight.result == 'success' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Create draft release if absent
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.preflight.outputs.tag }}
          REF: ${{ needs.preflight.outputs.ref }}
          RELEASE_NAME: ${{ needs.preflight.outputs.release_name }}
          IS_PRERELEASE: ${{ needs.preflight.outputs.is_prerelease }}
          PREVIOUS_TAG: ${{ needs.preflight.outputs.previous_tag }}
        run: |
          # Never re-draft an existing release: flipping a published release
          # back to draft would pull it (and its updater feed) out from under
          # users if a later build then fails. Leave any existing release as-is
          # and let the build jobs upload into it.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; leaving its published/draft state unchanged."
            exit 0
          fi
          args=(--draft --generate-notes --target "$REF" --title "$RELEASE_NAME")
          [[ "$IS_PRERELEASE" == "true" ]] && args+=(--prerelease)
          [[ -n "$PREVIOUS_TAG" ]] && args+=(--notes-start-tag "$PREVIOUS_TAG")
          gh release create "$TAG" "${args[@]}"

  build:
    name: Build ${{ matrix.label }}
    needs: [preflight, build_wsl_node_pty, create_release]
    if: ${{ !cancelled() && needs.preflight.result == 'success' && needs.create_release.result == 'success' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: macos-15
            platform: mac
            target: dmg
            arch: arm64
          - label: macOS x64
            runner: macos-15
            platform: mac
            target: dmg
            arch: x64
          - label: Windows x64
            runner: windows-2025
            platform: win
            target: nsis
            arch: x64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}
          fetch-depth: 0

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Align package versions
        run: node scripts/update-release-package-versions.ts "${{ needs.preflight.outputs.version }}"

      - name: Download WSL node-pty prebuild
        if: matrix.platform == 'win'
        uses: actions/download-artifact@v7
        with:
          name: wsl-node-pty-x64
          path: wsl-prebuild

      - name: Install Spectre-mitigated MSVC libraries
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installPath = & $vswhere -products * -latest -property installationPath
          $setupExe = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\setup.exe"
          $proc = Start-Process -FilePath $setupExe `
            -ArgumentList "modify", "--installPath", "`"$installPath`"", "--add", `
            "Microsoft.VisualStudio.Component.VC.Tools.x86.x64.Spectre", "--quiet", "--norestart" `
            -Wait -PassThru -NoNewWindow
          if ($null -eq $proc -or $proc.ExitCode -ne 0) { exit 1 }

      - name: Build desktop artifact
        shell: bash
        run: |
          args=(
            --platform "${{ matrix.platform }}"
            --target "${{ matrix.target }}"
            --arch "${{ matrix.arch }}"
            --build-version "${{ needs.preflight.outputs.version }}"
            --verbose
          )
          if [[ "${{ matrix.platform }}" == "win" ]]; then
            args+=(--wsl-prebuild "$GITHUB_WORKSPACE/wsl-prebuild/pty.node")
          fi
          vp run dist:desktop:artifact "${args[@]}"

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-publish
          shopt -s nullglob
          for pattern in "release/*.dmg" "release/*.zip" "release/*.exe" "release/*.blockmap" "release/*.yml"; do
            for file in $pattern; do
              # builder-debug.yml is emitted identically by every platform under
              # --verbose and is not an updater manifest. Keep it out of the
              # release so three jobs do not race to --clobber the same asset.
              [[ "$(basename "$file")" == "builder-debug.yml" ]] && continue
              cp "$file" release-publish/
            done
          done
          if [[ "${{ matrix.platform }}" == "mac" && "${{ matrix.arch }}" != "arm64" ]]; then
            for manifest in release-publish/*-mac.yml; do
              mv "$manifest" "${manifest%.yml}-${{ matrix.arch }}.yml"
            done
          fi

      - name: Upload assets to draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          shopt -s nullglob
          assets=(release-publish/*)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No release assets found to upload." >&2
            exit 1
          fi
          gh release upload "$TAG" "${assets[@]}" --clobber

  release:
    name: Finalize GitHub Release
    needs: [preflight, create_release, build]
    if: ${{ !failure() && !cancelled() && needs.preflight.result == 'success' && needs.build.result == 'success' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Merge macOS updater manifests
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          mkdir -p release-assets
          gh release download "$TAG" --dir release-assets --pattern '*.yml'
          shopt -s nullglob
          # The updater feed must be complete before we flip the draft live.
          # Assert on structure, not channel-specific names: stable emits
          # latest-*.yml, nightly emits nightly-*.yml. Expect exactly one macOS
          # x64 manifest and exactly one Windows manifest (the channel .yml with
          # no platform suffix), so a gap fails loudly instead of publishing a
          # broken auto-update feed.
          mac_x64=(release-assets/*-mac-x64.yml)
          if [[ ${#mac_x64[@]} -ne 1 ]]; then
            echo "Expected exactly one macOS x64 updater manifest, found ${#mac_x64[@]}" >&2
            exit 1
          fi
          win_manifests=()
          for manifest in release-assets/*.yml; do
            case "$(basename "$manifest")" in
              *-mac.yml | *-mac-x64.yml) ;;
              *) win_manifests+=("$manifest") ;;
            esac
          done
          if [[ ${#win_manifests[@]} -ne 1 ]]; then
            echo "Expected exactly one Windows updater manifest, found ${#win_manifests[@]}" >&2
            exit 1
          fi
          merged=0
          for x64_manifest in "${mac_x64[@]}"; do
            arm64_manifest="${x64_manifest%-x64.yml}.yml"
            if [[ -f "$arm64_manifest" ]]; then
              node scripts/merge-update-manifests.ts --platform mac "$arm64_manifest" "$x64_manifest"
              gh release upload "$TAG" "$arm64_manifest" --clobber
              gh release delete-asset "$TAG" "$(basename "$x64_manifest")" --yes
              merged=$((merged + 1))
            fi
          done
          if [[ "$merged" -ne 1 ]]; then
            echo "Expected exactly one macOS manifest merge, got $merged" >&2
            exit 1
          fi

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.preflight.outputs.tag }}
          MAKE_LATEST: ${{ needs.preflight.outputs.make_latest }}
        run: |
          if [[ "$MAKE_LATEST" == "true" ]]; then
            gh release edit "$TAG" --draft=false --latest
          else
            gh release edit "$TAG" --draft=false --latest=false
          fi
